version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/evals"
    schedule:
      interval: weekly
      day: monday
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      all-actions:
        patterns:
          - "*"
