name: Tag

on:
  push:
    branches: ["main"]

permissions: read-all

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # semantic-release requires full history to determine next version

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: lts/*

      - name: Capture latest tag before semantic-release
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || true)" >> "${GITHUB_OUTPUT}"

      - name: Create version tag
        run: npx --yes semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger release workflow for new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/dispatch-release-workflow.sh "${{ steps.before.outputs.tag }}"
