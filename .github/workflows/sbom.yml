name: SBOM

on:
  push:
    branches: ["main"]

permissions: read-all

jobs:
  sbom:
    name: Generate and upload SBOM
    runs-on: ubuntu-latest
    permissions:
      # Required to submit dependency snapshots.
      contents: write
      # Required for keyless signing via sigstore.
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26"

      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          # Scan the whole repository so Go module dependencies are discovered.
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
          upload-artifact: true
          # Submit to the GitHub dependency graph for Dependabot alerts.
          dependency-snapshot: true
