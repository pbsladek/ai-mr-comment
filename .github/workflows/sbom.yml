name: SBOM

on:
  push:
    branches: ["main"]

permissions: read-all

jobs:
  sbom:
    name: Generate and upload SBOM
    runs-on: ubuntu-latest
    permissions:
      # Required to submit dependency snapshots.
      contents: write
      # Required for keyless signing via sigstore.
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          # Scan the whole repository so Go module dependencies are discovered.
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
          upload-artifact: true
          # Submit to the GitHub dependency graph for Dependabot alerts.
          dependency-snapshot: true
