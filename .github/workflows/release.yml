name: Release

on:
  workflow_run:
    workflows: ["Tag"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.6.0)"
        required: true
        type: string

permissions: read-all

jobs:
  validate:
    name: Validate Release Tag
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.resolve_tag.outputs.skip }}
      tag: ${{ steps.resolve_tag.outputs.tag }}
      tag_commit: ${{ steps.resolve_tag.outputs.tag_commit }}
      tag_commit_short: ${{ steps.resolve_tag.outputs.tag_commit_short }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: refs/heads/main

      - name: Resolve and validate release tag
        id: resolve_tag
        run: .github/scripts/resolve-release-tag.sh "${{ github.event.inputs.tag }}" "${{ github.event.workflow_run.head_sha }}" "${GITHUB_OUTPUT}"

  artifacts:
    name: Build Release Artifacts
    needs: validate
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      source_url: ${{ steps.release_meta.outputs.source_url }}
      source_sha256: ${{ steps.release_meta.outputs.source_sha256 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Install syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release metadata
        id: release_meta
        run: .github/scripts/prepare-release-metadata.sh "${{ needs.validate.outputs.tag }}" "${GITHUB_OUTPUT}"

      - name: Attest release archives provenance
        id: attest_binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Stage archive provenance bundle
        run: cp "${{ steps.attest_binaries.outputs.bundle-path }}" "dist/provenance-binaries.intoto.jsonl"

      - name: Upload binary provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: .github/scripts/upload-release-assets.sh "${TAG}" "dist/provenance-binaries.intoto.jsonl"

  docker:
    name: Build and Push Docker Image
    needs: validate
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      docker_digest: ${{ steps.docker_build.outputs.digest }}
      docker_tags: ${{ steps.docker_tags.outputs.tags }}
      docker_enabled: ${{ steps.docker_creds.outputs.enabled }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Check Docker publish credentials
        id: docker_creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: .github/scripts/check-docker-creds.sh

      - name: Set up QEMU
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to DHI registry
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_tags
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          IMAGE: pwbsladek/ai-mr-comment
        run: .github/scripts/compute-docker-tags.sh "${TAG}" "${IMAGE}"

      - name: Build and push Docker image
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.tag }}
            COMMIT=${{ needs.validate.outputs.tag_commit_short }}
            COMMIT_FULL=${{ needs.validate.outputs.tag_commit }}
            CREATED=${{ github.run_started_at }}

      - name: Attest Docker image provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: attest_docker
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: docker.io/pwbsladek/ai-mr-comment
          subject-digest: ${{ steps.docker_build.outputs.digest }}

      - name: Stage Docker provenance bundle
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        run: mkdir -p dist && cp "${{ steps.attest_docker.outputs.bundle-path }}" dist/provenance-docker.intoto.jsonl

      - name: Upload Docker provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: .github/scripts/upload-release-assets.sh "${TAG}" "dist/provenance-docker.intoto.jsonl"

  docker_fips:
    name: Build and Push Docker FIPS Image
    needs: validate
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      docker_fips_digest: ${{ steps.docker_build_fips.outputs.digest }}
      docker_fips_tags: ${{ steps.docker_tags_fips.outputs.tags }}
      docker_fips_enabled: ${{ steps.docker_creds.outputs.enabled }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Check Docker publish credentials
        id: docker_creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: .github/scripts/check-docker-creds.sh

      - name: Set up QEMU
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to DHI registry
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker FIPS tags
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_tags_fips
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          IMAGE: pwbsladek/ai-mr-comment
        run: .github/scripts/compute-docker-tags.sh "${TAG}" "${IMAGE}" "-fips"

      - name: Build and push Docker FIPS image
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_build_fips
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags_fips.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.tag }}
            COMMIT=${{ needs.validate.outputs.tag_commit_short }}
            COMMIT_FULL=${{ needs.validate.outputs.tag_commit }}
            CREATED=${{ github.run_started_at }}
            GOFIPS140=v1.0.0

      - name: Attest Docker FIPS image provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: attest_docker_fips
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: docker.io/pwbsladek/ai-mr-comment
          subject-digest: ${{ steps.docker_build_fips.outputs.digest }}

      - name: Stage Docker FIPS provenance bundle
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        run: mkdir -p dist && cp "${{ steps.attest_docker_fips.outputs.bundle-path }}" dist/provenance-docker-fips.intoto.jsonl

      - name: Upload Docker FIPS provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: .github/scripts/upload-release-assets.sh "${TAG}" "dist/provenance-docker-fips.intoto.jsonl"

  finalize:
    name: Finalize Release
    needs: [validate, artifacts, docker, docker_fips]
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Download checksums asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: bash .github/scripts/download-release-asset.sh "${TAG}" "checksums.txt" "dist"

      - name: Generate immutable release manifest
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          SOURCE_URL: ${{ needs.artifacts.outputs.source_url }}
          SOURCE_SHA256: ${{ needs.artifacts.outputs.source_sha256 }}
          DOCKER_IMAGE: pwbsladek/ai-mr-comment
          DOCKER_TAGS: ${{ needs.docker.outputs.docker_tags }}
          DOCKER_DIGEST: ${{ needs.docker.outputs.docker_digest }}
        run: .github/scripts/generate-release-manifest.sh "${TAG}" "$(git rev-list -n 1 "${TAG}")" "${SOURCE_URL}" "${SOURCE_SHA256}" "${DOCKER_IMAGE}" "${DOCKER_TAGS}" "${DOCKER_DIGEST}" "dist/release-manifest.json"

      - name: Sign immutable release manifest
        run: .github/scripts/sign-release-manifest.sh

      - name: Upload release manifest assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: .github/scripts/upload-release-assets.sh "${TAG}" "dist/release-manifest.json" "dist/release-manifest.json.bundle"

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRE_DOCKER_PROVENANCE: ${{ needs.docker.outputs.docker_enabled }}
        run: .github/scripts/verify-release-assets.sh "${{ needs.validate.outputs.tag }}" "pbsladek/ai-mr-comment" "${REQUIRE_DOCKER_PROVENANCE}"

      - name: Publish release summary
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          REQUIRE_DOCKER_PROVENANCE: ${{ needs.docker.outputs.docker_enabled }}
        run: bash .github/scripts/write-release-summary.sh "${TAG}" "${REQUIRE_DOCKER_PROVENANCE}"

  homebrew_tap:
    name: Dispatch Homebrew Tap Update
    needs: [validate, artifacts]
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Dispatch release metadata to Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          SOURCE_URL: ${{ needs.artifacts.outputs.source_url }}
          SOURCE_SHA256: ${{ needs.artifacts.outputs.source_sha256 }}
          COMMIT: ${{ needs.validate.outputs.tag_commit_short }}
          COMMIT_FULL: ${{ needs.validate.outputs.tag_commit }}
        run: .github/scripts/dispatch-homebrew-tap.sh "${TAG}" "${SOURCE_URL}" "${SOURCE_SHA256}" "${COMMIT}" "${COMMIT_FULL}"
