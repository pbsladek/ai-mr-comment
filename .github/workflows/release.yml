name: Release

on:
  workflow_run:
    workflows: ["Tag"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.6.0)"
        required: true
        type: string

permissions: read-all

jobs:
  validate:
    name: Validate Release Tag
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.resolve_tag.outputs.skip }}
      tag: ${{ steps.resolve_tag.outputs.tag }}
      tag_commit: ${{ steps.resolve_tag.outputs.tag_commit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: refs/heads/main

      - name: Resolve and validate release tag
        id: resolve_tag
        run: |
          .github/scripts/resolve-release-tag.sh \
            "${{ github.event.inputs.tag }}" \
            "${{ github.event.workflow_run.head_sha }}" \
            "${GITHUB_OUTPUT}"

  artifacts:
    name: Build Release Artifacts
    needs: validate
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      source_url: ${{ steps.release_meta.outputs.source_url }}
      source_sha256: ${{ steps.release_meta.outputs.source_sha256 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@28d71544de8eaf1b958d335707167c5f783590ad # v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release metadata
        id: release_meta
        run: .github/scripts/prepare-release-metadata.sh "${{ needs.validate.outputs.tag }}" "${GITHUB_OUTPUT}"

      - name: Attest release archives provenance
        id: attest_binaries
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Stage archive provenance bundle
        run: cp "${{ steps.attest_binaries.outputs.bundle-path }}" "dist/provenance-binaries.intoto.jsonl"

      - name: Upload binary provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          bash .github/scripts/upload-release-assets.sh "${TAG}" \
            "dist/provenance-binaries.intoto.jsonl"

  docker:
    name: Build and Push Docker Image
    needs: validate
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      docker_digest: ${{ steps.docker_build.outputs.digest }}
      docker_tags: ${{ steps.docker_tags.outputs.tags }}
      docker_enabled: ${{ steps.docker_creds.outputs.enabled }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Check Docker publish credentials
        id: docker_creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Docker publish skipped: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing."
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to Docker Hub
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to DHI registry
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_tags
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          IMAGE: pwbsladek/ai-mr-comment
        run: |
          set -euo pipefail
          if [[ "${TAG}" == *-* ]]; then
            echo "tags=${IMAGE}:${TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "tags=${IMAGE}:${TAG},${IMAGE}:latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push Docker image
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.tag }}

      - name: Attest Docker image provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: attest_docker
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: docker.io/pwbsladek/ai-mr-comment
          subject-digest: ${{ steps.docker_build.outputs.digest }}

      - name: Stage Docker provenance bundle
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        run: |
          mkdir -p dist
          cp "${{ steps.attest_docker.outputs.bundle-path }}" "dist/provenance-docker.intoto.jsonl"

      - name: Upload Docker provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          bash .github/scripts/upload-release-assets.sh "${TAG}" \
            "dist/provenance-docker.intoto.jsonl"

  docker_fips:
    name: Build and Push Docker FIPS Image
    needs: validate
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      docker_fips_digest: ${{ steps.docker_build_fips.outputs.digest }}
      docker_fips_tags: ${{ steps.docker_tags_fips.outputs.tags }}
      docker_fips_enabled: ${{ steps.docker_creds.outputs.enabled }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Check Docker publish credentials
        id: docker_creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Docker publish skipped: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing."
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to Docker Hub
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to DHI registry
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker FIPS tags
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_tags_fips
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          IMAGE: pwbsladek/ai-mr-comment
        run: |
          set -euo pipefail
          if [[ "${TAG}" == *-* ]]; then
            echo "tags=${IMAGE}:${TAG}-fips" >> "${GITHUB_OUTPUT}"
          else
            echo "tags=${IMAGE}:${TAG}-fips,${IMAGE}:latest-fips" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push Docker FIPS image
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_build_fips
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags_fips.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate.outputs.tag }}
            GOFIPS140=v1.0.0

      - name: Attest Docker FIPS image provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: attest_docker_fips
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: docker.io/pwbsladek/ai-mr-comment
          subject-digest: ${{ steps.docker_build_fips.outputs.digest }}

      - name: Stage Docker FIPS provenance bundle
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        run: |
          mkdir -p dist
          cp "${{ steps.attest_docker_fips.outputs.bundle-path }}" "dist/provenance-docker-fips.intoto.jsonl"

      - name: Upload Docker FIPS provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          bash .github/scripts/upload-release-assets.sh "${TAG}" \
            "dist/provenance-docker-fips.intoto.jsonl"

  finalize:
    name: Finalize Release
    needs: [validate, artifacts, docker, docker_fips]
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Download checksums asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: bash .github/scripts/download-release-asset.sh "${TAG}" "checksums.txt" "dist"

      - name: Generate immutable release manifest
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          SOURCE_URL: ${{ needs.artifacts.outputs.source_url }}
          SOURCE_SHA256: ${{ needs.artifacts.outputs.source_sha256 }}
          DOCKER_IMAGE: pwbsladek/ai-mr-comment
          DOCKER_TAGS: ${{ needs.docker.outputs.docker_tags }}
          DOCKER_DIGEST: ${{ needs.docker.outputs.docker_digest }}
        run: |
          set -euo pipefail
          mkdir -p dist
          COMMIT_SHA="$(git rev-list -n 1 "${TAG}")"
          bash .github/scripts/generate-release-manifest.sh \
            "${TAG}" \
            "${COMMIT_SHA}" \
            "${SOURCE_URL}" \
            "${SOURCE_SHA256}" \
            "${DOCKER_IMAGE}" \
            "${DOCKER_TAGS}" \
            "${DOCKER_DIGEST}" \
            "dist/release-manifest.json"

      - name: Sign immutable release manifest
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature "dist/release-manifest.json.sig" \
            --output-certificate "dist/release-manifest.json.pem" \
            "dist/release-manifest.json"

      - name: Upload release manifest assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          bash .github/scripts/upload-release-assets.sh "${TAG}" \
            "dist/release-manifest.json" \
            "dist/release-manifest.json.sig" \
            "dist/release-manifest.json.pem"

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRE_DOCKER_PROVENANCE: ${{ needs.docker.outputs.docker_enabled }}
        run: .github/scripts/verify-release-assets.sh "${{ needs.validate.outputs.tag }}" "pbsladek/ai-mr-comment" "${REQUIRE_DOCKER_PROVENANCE}"

      - name: Publish release summary
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          REQUIRE_DOCKER_PROVENANCE: ${{ needs.docker.outputs.docker_enabled }}
        run: bash .github/scripts/write-release-summary.sh "${TAG}" "${REQUIRE_DOCKER_PROVENANCE}"

  homebrew_tap:
    name: Dispatch Homebrew Tap Update
    needs: [validate, artifacts]
    if: ${{ needs.validate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ needs.validate.outputs.tag_commit }}

      - name: Dispatch release metadata to Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          SOURCE_URL: ${{ needs.artifacts.outputs.source_url }}
          SOURCE_SHA256: ${{ needs.artifacts.outputs.source_sha256 }}
        run: .github/scripts/dispatch-homebrew-tap.sh "${TAG}" "${SOURCE_URL}" "${SOURCE_SHA256}"
