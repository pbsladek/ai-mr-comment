name: Release

on:
  workflow_run:
    workflows: ["Tag"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.6.0)"
        required: true
        type: string

permissions: read-all

jobs:
  release:
    name: Create GitHub Release
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write # required for keyless cosign signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.event.workflow_run.head_sha || github.ref_name }}

      - name: Resolve release tag
        id: resolve_tag
        run: .github/scripts/resolve-release-tag.sh "${{ github.event.inputs.tag }}" "${GITHUB_OUTPUT}"

      - name: Skip release when no tag was created
        if: ${{ steps.resolve_tag.outputs.skip == 'true' }}
        run: echo "No release tag on workflow commit; nothing to publish."

      - name: Set up Go
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Install cosign
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install syft
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        uses: anchore/sbom-action/download-syft@28d71544de8eaf1b958d335707167c5f783590ad # v0

      - name: Run GoReleaser
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release metadata
        id: release_meta
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        run: .github/scripts/prepare-release-metadata.sh "${{ steps.resolve_tag.outputs.tag }}" "${GITHUB_OUTPUT}"

      - name: Generate installer manifest
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail
          COMMIT_SHA="$(git rev-list -n 1 "${TAG}")"
          bash scripts/generate-installer-manifest.sh \
            --repo "pbsladek/ai-mr-comment" \
            --tag "${TAG}" \
            --commit "${COMMIT_SHA}" \
            --out "dist/installer-manifest.json"

      - name: Sign installer manifest
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature "dist/installer-manifest.json.sig" \
            --output-certificate "dist/installer-manifest.json.pem" \
            "dist/installer-manifest.json"

      - name: Upload installer manifest assets
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail
          bash .github/scripts/upload-release-assets.sh "${TAG}" \
            "dist/installer-manifest.json" \
            "dist/installer-manifest.json.sig" \
            "dist/installer-manifest.json.pem"

      - name: Check Docker publish credentials
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        id: docker_creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Docker publish skipped: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing."
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to Docker Hub
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to DHI registry
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_tags
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
          IMAGE: pwbsladek/ai-mr-comment
        run: |
          set -euo pipefail
          if [[ "${TAG}" == *-* ]]; then
            echo "tags=${IMAGE}:${TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "tags=${IMAGE}:${TAG},${IMAGE}:latest" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push Docker image
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: docker_build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.release_meta.outputs.tag }}

      - name: Attest release archives provenance
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        id: attest_binaries
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Stage archive provenance bundle
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        run: cp "${{ steps.attest_binaries.outputs.bundle-path }}" "dist/provenance-binaries.intoto.jsonl"

      - name: Attest Docker image provenance
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        id: attest_docker
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: docker.io/pwbsladek/ai-mr-comment
          subject-digest: ${{ steps.docker_build.outputs.digest }}

      - name: Stage Docker provenance bundle
        if: ${{ steps.docker_creds.outputs.enabled == 'true' }}
        run: cp "${{ steps.attest_docker.outputs.bundle-path }}" "dist/provenance-docker.intoto.jsonl"

      - name: Generate immutable release manifest
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_URL: ${{ steps.release_meta.outputs.source_url }}
          SOURCE_SHA256: ${{ steps.release_meta.outputs.source_sha256 }}
          DOCKER_IMAGE: pwbsladek/ai-mr-comment
          DOCKER_TAGS: ${{ steps.docker_tags.outputs.tags }}
          DOCKER_DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: |
          set -euo pipefail
          COMMIT_SHA="$(git rev-list -n 1 "${TAG}")"
          bash .github/scripts/generate-release-manifest.sh \
            "${TAG}" \
            "${COMMIT_SHA}" \
            "${SOURCE_URL}" \
            "${SOURCE_SHA256}" \
            "${DOCKER_IMAGE}" \
            "${DOCKER_TAGS}" \
            "${DOCKER_DIGEST}" \
            "dist/release-manifest.json"

      - name: Sign immutable release manifest
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature "dist/release-manifest.json.sig" \
            --output-certificate "dist/release-manifest.json.pem" \
            "dist/release-manifest.json"

      - name: Upload release manifest and provenance assets
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail
          bash .github/scripts/upload-release-assets.sh "${TAG}" \
            "dist/release-manifest.json" \
            "dist/release-manifest.json.sig" \
            "dist/release-manifest.json.pem" \
            "dist/provenance-binaries.intoto.jsonl" \
            "dist/provenance-docker.intoto.jsonl"

      - name: Verify release assets
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRE_DOCKER_PROVENANCE: ${{ steps.docker_creds.outputs.enabled }}
        run: .github/scripts/verify-release-assets.sh "${{ steps.release_meta.outputs.tag }}" "pbsladek/ai-mr-comment" "${REQUIRE_DOCKER_PROVENANCE}"

      - name: Publish release summary
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
          REQUIRE_DOCKER_PROVENANCE: ${{ steps.docker_creds.outputs.enabled }}
        run: bash .github/scripts/write-release-summary.sh "${TAG}" "${REQUIRE_DOCKER_PROVENANCE}"

      - name: Dispatch release metadata to Homebrew tap
        if: ${{ steps.resolve_tag.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
          TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_URL: ${{ steps.release_meta.outputs.source_url }}
          SOURCE_SHA256: ${{ steps.release_meta.outputs.source_sha256 }}
        run: .github/scripts/dispatch-homebrew-tap.sh "${TAG}" "${SOURCE_URL}" "${SOURCE_SHA256}"
